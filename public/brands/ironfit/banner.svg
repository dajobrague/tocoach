<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="ironfit-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#ironfit-gradient)"/>
  
  <!-- Decorative dumbbells -->
  <g transform="translate(100, 150)" opacity="0.2">
    <rect x="0" y="40" width="20" height="16" rx="8" fill="white"/>
    <rect x="20" y="24" width="72" height="48" rx="8" fill="white"/>
    <rect x="92" y="40" width="20" height="16" rx="8" fill="white"/>
  </g>
  
  <g transform="translate(1000, 100)" opacity="0.15">
    <rect x="0" y="40" width="16" height="12" rx="6" fill="white"/>
    <rect x="16" y="30" width="56" height="32" rx="6" fill="white"/>
    <rect x="72" y="40" width="16" height="12" rx="6" fill="white"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(600, 200)">
    <!-- Logo icon -->
    <g transform="translate(-180, -20)">
      <rect x="0" y="16" width="12" height="8" rx="4" fill="white"/>
      <rect x="12" y="12" width="36" height="16" rx="4" fill="white"/>
      <rect x="48" y="16" width="12" height="8" rx="4" fill="white"/>
    </g>
    
    <!-- Title -->
    <text x="-120" y="10" fill="white" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="700" text-anchor="start">IronFit</text>
    
    <!-- Subtitle -->
    <text x="-120" y="45" fill="white" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="400" text-anchor="start" opacity="0.9">
      Forge Your Strength
    </text>
  </g>
  
  <!-- Bottom decoration -->
  <path d="M0 320 Q300 280 600 320 T1200 320 V400 H0 Z" fill="white" fill-opacity="0.1"/>
</svg>
