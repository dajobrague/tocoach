<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="zen-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="400" fill="url(#zen-gradient)"/>
  
  <!-- Decorative zen elements -->
  <g transform="translate(150, 120)" opacity="0.2">
    <circle cx="30" cy="30" r="24" stroke="white" stroke-width="3" fill="none"/>
    <path d="M15 30 Q30 20 45 30 Q30 40 15 30" fill="white"/>
  </g>
  
  <g transform="translate(950, 80)" opacity="0.15">
    <circle cx="25" cy="25" r="20" stroke="white" stroke-width="2" fill="none"/>
    <path d="M12 25 Q25 18 38 25 Q25 32 12 25" fill="white"/>
  </g>
  
  <g transform="translate(200, 280)" opacity="0.1">
    <circle cx="20" cy="20" r="16" stroke="white" stroke-width="2" fill="none"/>
    <path d="M10 20 Q20 14 30 20 Q20 26 10 20" fill="white"/>
  </g>
  
  <!-- Main content -->
  <g transform="translate(600, 200)">
    <!-- Logo icon -->
    <g transform="translate(-200, -25)">
      <circle cx="24" cy="24" r="20" stroke="white" stroke-width="3" fill="none"/>
      <path d="M12 24 Q24 16 36 24 Q24 32 12 24" fill="white"/>
      <path d="M24 12 Q28 20 24 28 Q20 20 24 12" fill="white" opacity="0.7"/>
    </g>
    
    <!-- Title -->
    <text x="-150" y="10" fill="white" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="500" text-anchor="start">Zen Coach</text>
    
    <!-- Subtitle -->
    <text x="-150" y="45" fill="white" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" text-anchor="start" opacity="0.9">
      Mindful Movement &amp; Wellness
    </text>
  </g>
  
  <!-- Bottom decoration with organic curves -->
  <path d="M0 300 Q200 260 400 300 Q600 340 800 300 Q1000 260 1200 300 V400 H0 Z" fill="white" fill-opacity="0.1"/>
</svg>
